name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          DATABASE_PATH: ':memory:'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build --if-present

      - name: Verify application starts
        run: |
          timeout 10 node src/index.js &
          APP_PID=$!
          sleep 3
          curl --fail http://localhost:3000/health || (kill $APP_PID 2>/dev/null; exit 1)
          kill $APP_PID 2>/dev/null || true
        env:
          PORT: 3000
          DATABASE_PATH: ':memory:'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: |
            src/
            package.json
            package-lock.json
          retention-days: 7

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to preview environment
        id: deploy
        run: |
          # Replace this step with your actual deployment command, e.g.:
          # - Railway: railway up --environment preview-${{ github.event.pull_request.number }}
          # - Vercel:  vercel deploy --token $VERCEL_TOKEN
          # - Render:  trigger deploy hook via curl
          echo "preview_url=https://preview-pr-${{ github.event.pull_request.number }}.example.com" >> "$GITHUB_OUTPUT"
          echo "Deploying PR #${{ github.event.pull_request.number }} to preview environment"
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            const body = `### Preview Deployment\n\n✅ Preview deployed successfully!\n\n**URL:** ${previewUrl}\n\n*This preview will be cleaned up when the PR is closed.*`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existingComment = comments.find(c => c.body.includes('### Preview Deployment'));
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup-preview:
    name: Cleanup Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && (github.event.action == 'closed')
    steps:
      - name: Tear down preview environment
        run: |
          # Replace with actual teardown command for your platform, e.g.:
          # railway environment delete preview-${{ github.event.pull_request.number }}
          echo "Cleaning up preview environment for PR #${{ github.event.pull_request.number }}"
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: Comment cleanup on PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '### Preview Deployment\n\n🧹 Preview environment has been cleaned up.',
            });

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.production_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to production
        id: deploy
        run: |
          # Replace this step with your actual production deployment command, e.g.:
          # - Railway: railway up --environment production
          # - Vercel:  vercel deploy --prod --token $VERCEL_TOKEN
          # - AWS:     aws ecs update-service --cluster prod --service app --force-new-deployment
          echo "production_url=https://app.example.com" >> "$GITHUB_OUTPUT"
          echo "Deploying commit ${{ github.sha }} to production"
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          PORT: ${{ secrets.PRODUCTION_PORT }}

      - name: Post-deploy health check
        id: healthcheck
        run: |
          PRODUCTION_URL="${{ steps.deploy.outputs.production_url }}"
          MAX_RETRIES=5
          RETRY_DELAY=10
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Health check attempt $i/$MAX_RETRIES..."
            HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" "${PRODUCTION_URL}/health" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed (HTTP $HTTP_STATUS)"
              exit 0
            fi
            echo "Health check failed (HTTP $HTTP_STATUS), waiting ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done
          echo "Health check failed after $MAX_RETRIES attempts — triggering rollback"
          exit 1

      - name: Rollback on health check failure
        if: failure() && steps.healthcheck.outcome == 'failure'
        run: |
          # Replace with actual rollback command for your platform, e.g.:
          # - Railway: railway rollback --environment production
          # - AWS ECS: aws ecs update-service --cluster prod --service app --task-definition <previous>
          echo "Rolling back production deployment due to failed health check"
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: Notify on deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              description: 'Production deployment failed or was rolled back',
              context: 'deploy/production',
            });
