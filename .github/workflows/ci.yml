name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          DATABASE_PATH: ':memory:'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build --if-present

      - name: Verify application starts
        run: |
          node src/index.js &
          APP_PID=$!
          # Wait for app to start, with retries
          for i in $(seq 1 6); do
            sleep 3
            HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" "http://localhost:${PORT}/health" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "App started successfully (HTTP $HTTP_STATUS)"
              kill $APP_PID 2>/dev/null || true
              exit 0
            fi
            echo "Attempt $i: app not ready yet (HTTP $HTTP_STATUS), retrying..."
          done
          echo "App failed to start within timeout"
          kill $APP_PID 2>/dev/null || true
          exit 1
        env:
          PORT: 3000
          DATABASE_PATH: ':memory:'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: |
            dist/
            package.json
            package-lock.json
          retention-days: 7

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    timeout-minutes: 10
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "ERROR: DEPLOY_TOKEN secret is not set. Skipping deployment."
            exit 1
          fi
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: Deploy to preview environment
        id: deploy
        run: |
          # TODO: Replace with your actual deployment command, e.g.:
          # - Railway: railway up --environment preview-${{ github.event.pull_request.number }}
          # - Vercel:  vercel deploy --token $VERCEL_TOKEN
          # - Render:  trigger deploy hook via curl
          echo "preview_url=https://preview-pr-${{ github.event.pull_request.number }}.example.com" >> "$GITHUB_OUTPUT"
          echo "Deploying PR #${{ github.event.pull_request.number }} to preview environment"
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            const body = `### Preview Deployment\n\n✅ Preview deployed successfully!\n\n**URL:** ${previewUrl}\n\n*This preview will be cleaned up when the PR is closed.*`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existingComment = comments.find(c => c.body.includes('### Preview Deployment'));
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup-preview:
    name: Cleanup Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    timeout-minutes: 10
    steps:
      - name: Validate required secrets
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "ERROR: DEPLOY_TOKEN secret is not set. Skipping cleanup."
            exit 1
          fi
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: Tear down preview environment
        run: |
          # TODO: Replace with actual teardown command for your platform, e.g.:
          # railway environment delete preview-${{ github.event.pull_request.number }}
          echo "Cleaning up preview environment for PR #${{ github.event.pull_request.number }}"
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: Comment cleanup on PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '### Preview Deployment\n\n🧹 Preview environment has been cleaned up.',
            });

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10
    environment:
      name: production
      url: ${{ steps.deploy.outputs.production_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "ERROR: DEPLOY_TOKEN secret is not set. Cannot deploy."
            exit 1
          fi
          if [ -z "$DATABASE_URL" ]; then
            echo "ERROR: PRODUCTION_DATABASE_URL secret is not set. Cannot deploy."
            exit 1
          fi
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      - name: Deploy to production
        id: deploy
        run: |
          # TODO: Replace with your actual production deployment command, e.g.:
          # - Railway: railway up --environment production
          # - Vercel:  vercel deploy --prod --token $VERCEL_TOKEN
          # - AWS:     aws ecs update-service --cluster prod --service app --force-new-deployment
          echo "production_url=https://app.example.com" >> "$GITHUB_OUTPUT"
          echo "Deploying commit ${{ github.sha }} to production"
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          PORT: ${{ secrets.PRODUCTION_PORT }}

      - name: Post-deploy health check
        id: healthcheck
        run: |
          PRODUCTION_URL="${{ steps.deploy.outputs.production_url }}"
          # TODO: Remove this guard once a real deployment command is configured above.
          # Until then the production_url is a placeholder and health checks will fail
          # or pass against the wrong host.
          if echo "$PRODUCTION_URL" | grep -q 'example.com'; then
            echo "Skipping health check — production_url is still a placeholder (${PRODUCTION_URL})."
            echo "Replace the deploy step with a real deployment command before enabling health checks."
            exit 0
          fi
          MAX_RETRIES=5
          RETRY_DELAY=10
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Health check attempt $i/$MAX_RETRIES..."
            HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" "${PRODUCTION_URL}/health" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed (HTTP $HTTP_STATUS)"
              exit 0
            fi
            echo "Health check failed (HTTP $HTTP_STATUS), waiting ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done
          echo "Health check failed after $MAX_RETRIES attempts — triggering rollback"
          exit 1

      - name: Rollback on health check failure
        if: failure() && steps.healthcheck.outcome == 'failure'
        run: |
          # TODO: Replace with actual rollback command for your platform, e.g.:
          # - Railway: railway rollback --environment production
          # - AWS ECS: aws ecs update-service --cluster prod --service app --task-definition <previous>
          # NOTE: This step is currently a no-op. Without a real rollback command,
          # a failed deployment will remain live until manually remediated.
          echo "WARNING: Rollback not yet configured — no action taken."
          echo "A failed deployment may still be live. Manual intervention required."
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: Notify on deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              description: 'Production deployment failed or was rolled back',
              context: 'deploy/production',
            });
